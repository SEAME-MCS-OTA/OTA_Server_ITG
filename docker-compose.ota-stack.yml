services:
  ota_gh_postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: ${OTA_GH_DB_NAME:-ota_db}
      POSTGRES_USER: ${OTA_GH_DB_USER:-ota_user}
      POSTGRES_PASSWORD: ${OTA_GH_DB_PASSWORD:-ota_password}
    volumes:
      - ota_gh_postgres_data:/var/lib/postgresql/data
      - ./ota/server/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${OTA_GH_DB_USER:-ota_user} -d ${OTA_GH_DB_NAME:-ota_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ota_gh_net
    restart: unless-stopped

  ota_gh_mosquitto:
    image: eclipse-mosquitto:2.0
    ports:
      - "${OTA_GH_MQTT_PORT:-1883}:1883"
      - "${OTA_GH_MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ./ota/server/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ota_gh_mosquitto_data:/mosquitto/data
      - ota_gh_mosquitto_log:/mosquitto/log
    healthcheck:
      test: [ "CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 | grep -v Error || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ota_gh_net
    restart: unless-stopped

  ota_gh_server:
    build:
      context: ./ota/server/server
      dockerfile: Dockerfile
    environment:
      SECRET_KEY: ${OTA_GH_SECRET_KEY:-dev-secret-key-change-in-production}
      DEBUG: ${OTA_GH_DEBUG:-False}
      DB_HOST: ota_gh_postgres
      DB_PORT: 5432
      DB_NAME: ${OTA_GH_DB_NAME:-ota_db}
      DB_USER: ${OTA_GH_DB_USER:-ota_user}
      DB_PASSWORD: ${OTA_GH_DB_PASSWORD:-ota_password}
      HOST: 0.0.0.0
      PORT: 8080
      FIRMWARE_BASE_URL: ${OTA_GH_FIRMWARE_BASE_URL:-}
      MQTT_BROKER_HOST: ${OTA_GH_MQTT_BROKER_HOST:-ota_gh_mosquitto}
      MQTT_BROKER_PORT: ${OTA_GH_MQTT_BROKER_PORT:-1883}
      MQTT_USERNAME: ${OTA_GH_MQTT_USERNAME:-}
      MQTT_PASSWORD: ${OTA_GH_MQTT_PASSWORD:-}
      MQTT_QOS: 2
      MQTT_TOPIC_RELEASE_ANNOUNCE: ${OTA_GH_MQTT_TOPIC_RELEASE_ANNOUNCE:-ota/releases/announce}
      MQTT_TOPIC_VEHICLE_REGISTER: ${OTA_GH_MQTT_TOPIC_VEHICLE_REGISTER:-ota/vehicles/register}
      MQTT_ANNOUNCE_RETAIN: ${OTA_GH_MQTT_ANNOUNCE_RETAIN:-false}
      OCI_REGION: ${OTA_GH_OCI_REGION:-eu-frankfurt-1}
      OCI_NAMESPACE: ${OTA_GH_OCI_NAMESPACE:-froblbb55ntt}
      OCI_BUCKET: ${OTA_GH_OCI_BUCKET:-bucket-for-OTA}
      OCI_PAR_TOKEN: ${OTA_GH_OCI_PAR_TOKEN:-}
      OCI_FIRMWARE_PREFIX: ${OTA_GH_OCI_FIRMWARE_PREFIX:-firmware}
      FIRMWARE_DIR: /app/firmware_files
      LOG_LEVEL: ${OTA_GH_LOG_LEVEL:-INFO}
      REQUIRE_RECENT_VEHICLE: ${OTA_GH_REQUIRE_RECENT_VEHICLE:-true}
      VEHICLE_ONLINE_WINDOW_SEC: ${OTA_GH_VEHICLE_ONLINE_WINDOW_SEC:-300}
      LOCAL_DEVICE_MAP: ${OTA_GH_LOCAL_DEVICE_MAP:-vw-ivi-0026@192.168.86.23:8080}
      LOCAL_PROBE_ENABLED: ${OTA_GH_LOCAL_PROBE_ENABLED:-false}
      LOCAL_PROBE_INTERVAL_SEC: ${OTA_GH_LOCAL_PROBE_INTERVAL_SEC:-5}
      LOCAL_PROBE_TIMEOUT_SEC: ${OTA_GH_LOCAL_PROBE_TIMEOUT_SEC:-1.5}
      MQTT_COMMAND_ONLY: ${OTA_GH_MQTT_COMMAND_ONLY:-true}
      ANTHROPIC_API_KEY: ${OTA_GH_ANTHROPIC_API_KEY:-}
      LLM_VERIFY: ${OTA_GH_LLM_VERIFY:-false}
      LLM_MODEL: ${OTA_GH_LLM_MODEL:-claude-sonnet-4-20250514}
      COMMAND_SIGN_ENABLED: ${OTA_GH_COMMAND_SIGN_ENABLED:-true}
      COMMAND_SIGN_REQUIRE: ${OTA_GH_COMMAND_SIGN_REQUIRE:-true}
      COMMAND_SIGN_ALGO: ${OTA_GH_COMMAND_SIGN_ALGO:-ed25519}
      COMMAND_SIGN_KEY_ID: ${OTA_GH_COMMAND_SIGN_KEY_ID:-ota-ed25519-v1}
      COMMAND_SIGN_KEY_PATH: ${OTA_GH_COMMAND_SIGN_KEY_PATH:-/app/keys/ed25519/ota-signing.key}
      MONITORING_INGEST_URL: ${OTA_GH_MONITORING_INGEST_URL:-http://ota_gh_monitoring_backend:4000/ingest}
    ports:
      - "${OTA_GH_SERVER_PORT:-8080}:8080"
    volumes:
      - ./ota/server/firmware_files:/app/firmware_files
      - ./ota/keys/ed25519:/app/keys/ed25519:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      ota_gh_postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import requests; requests.get('http://localhost:8080/health', timeout=5).raise_for_status()\" || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ota_gh_net
    restart: unless-stopped

  ota_gh_monitoring_mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${OTA_GH_MONITORING_DB_NAME:-ota_dashboard}
      MYSQL_USER: ${OTA_GH_MONITORING_DB_USER:-ota_monitor}
      MYSQL_PASSWORD: ${OTA_GH_MONITORING_DB_PASSWORD:-ota_monitor_password}
      MYSQL_ROOT_PASSWORD: ${OTA_GH_MONITORING_DB_ROOT_PASSWORD:-ota_monitor_root}
    volumes:
      - ota_gh_monitoring_mysql_data:/var/lib/mysql
      - ./ota/server/monitoring_backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ota_gh_net
    restart: unless-stopped

  ota_gh_monitoring_backend:
    build:
      context: ./ota/server/monitoring_backend
      dockerfile: Dockerfile
    environment:
      DB_HOST: ota_gh_monitoring_mysql
      DB_PORT: 3306
      DB_NAME: ${OTA_GH_MONITORING_DB_NAME:-ota_dashboard}
      DB_USER: ${OTA_GH_MONITORING_DB_USER:-ota_monitor}
      DB_PASSWORD: ${OTA_GH_MONITORING_DB_PASSWORD:-ota_monitor_password}
      PORT: 4000
      FAILED_CASE_BASE_DIR: /app/failed-case
    ports:
      - "${OTA_GH_MONITORING_PORT:-4000}:4000"
    volumes:
      - ota_gh_monitoring_case_data:/app/failed-case
    depends_on:
      ota_gh_monitoring_mysql:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - ota_gh_net
    restart: unless-stopped

  ota_gh_dashboard:
    build:
      context: ./ota/server/dashboard
      dockerfile: Dockerfile
    ports:
      - "${OTA_GH_DASHBOARD_PORT:-3001}:80"
    depends_on:
      ota_gh_server:
        condition: service_healthy
    networks:
      - ota_gh_net
    restart: unless-stopped

volumes:
  ota_gh_postgres_data:
  ota_gh_mosquitto_data:
  ota_gh_mosquitto_log:
  ota_gh_monitoring_mysql_data:
  ota_gh_monitoring_case_data:


networks:
  ota_gh_net:
    driver: bridge
