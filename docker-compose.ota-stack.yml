services:
  ota_gh_postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: ${OTA_GH_DB_NAME:-ota_db}
      POSTGRES_USER: ${OTA_GH_DB_USER:-ota_user}
      POSTGRES_PASSWORD: ${OTA_GH_DB_PASSWORD:-ota_password}
    ports:
      - "${OTA_GH_DB_PORT:-5432}:5432"
    volumes:
      - ota_gh_postgres_data:/var/lib/postgresql/data
      - ./OTA_GH/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OTA_GH_DB_USER:-ota_user} -d ${OTA_GH_DB_NAME:-ota_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ota_gh_net
    restart: unless-stopped

  ota_gh_mosquitto:
    image: eclipse-mosquitto:2.0
    ports:
      - "${OTA_GH_MQTT_PORT:-1883}:1883"
      - "${OTA_GH_MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ./OTA_GH/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ota_gh_mosquitto_data:/mosquitto/data
      - ota_gh_mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 | grep -v Error || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ota_gh_net
    restart: unless-stopped

  ota_gh_server:
    build:
      context: ./OTA_GH/server
      dockerfile: Dockerfile
    environment:
      SECRET_KEY: ${OTA_GH_SECRET_KEY:-dev-secret-key-change-in-production}
      DEBUG: ${OTA_GH_DEBUG:-False}
      DB_HOST: ota_gh_postgres
      DB_PORT: 5432
      DB_NAME: ${OTA_GH_DB_NAME:-ota_db}
      DB_USER: ${OTA_GH_DB_USER:-ota_user}
      DB_PASSWORD: ${OTA_GH_DB_PASSWORD:-ota_password}
      HOST: 0.0.0.0
      PORT: 8080
      FIRMWARE_BASE_URL: ${OTA_GH_FIRMWARE_BASE_URL:-}
      MQTT_BROKER_HOST: ota_gh_mosquitto
      MQTT_BROKER_PORT: 1883
      MQTT_TRANSPORT: ${OTA_GH_MQTT_TRANSPORT:-tcp}
      MQTT_WS_PATH: ${OTA_GH_MQTT_WS_PATH:-/mqtt}
      MQTT_TLS_ENABLED: ${OTA_GH_MQTT_TLS_ENABLED:-false}
      MQTT_TLS_INSECURE: ${OTA_GH_MQTT_TLS_INSECURE:-false}
      MQTT_CA_CERTS: ${OTA_GH_MQTT_CA_CERTS:-}
      MQTT_CERTFILE: ${OTA_GH_MQTT_CERTFILE:-}
      MQTT_KEYFILE: ${OTA_GH_MQTT_KEYFILE:-}
      MQTT_QOS: 2
      FIRMWARE_DIR: /app/firmware_files
      LOG_LEVEL: ${OTA_GH_LOG_LEVEL:-INFO}
      MONITORING_INGEST_URL: ${OTA_GH_MONITORING_INGEST_URL:-http://ota_vlm_backend:4000/ingest}
      MONITORING_REGION_CITY: ${OTA_GH_MONITORING_REGION_CITY:-Wolfsburg}
      MONITORING_REGION_TIMEZONE: ${OTA_GH_MONITORING_REGION_TIMEZONE:-Europe/Berlin}
      MONITORING_VEHICLE_BRAND: ${OTA_GH_MONITORING_VEHICLE_BRAND:-Volkswagen}
      MONITORING_VEHICLE_SERIES: ${OTA_GH_MONITORING_VEHICLE_SERIES:-ID.5}
      LOCAL_DEVICE_MAP: ${OTA_GH_LOCAL_DEVICE_MAP:-vw-ivi-0026@192.168.86.250:8080}
      LOCAL_PROBE_INTERVAL_SEC: ${OTA_GH_LOCAL_PROBE_INTERVAL_SEC:-5}
      LOCAL_PROBE_TIMEOUT_SEC: ${OTA_GH_LOCAL_PROBE_TIMEOUT_SEC:-1.5}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_VERIFY: ${OTA_GH_LLM_VERIFY:-true}
      LLM_MODEL: ${OTA_GH_LLM_MODEL:-claude-sonnet-4-20250514}
    ports:
      - "${OTA_GH_SERVER_PORT:-8080}:8080"
    volumes:
      - ./OTA_GH/firmware_files:/app/firmware_files
    depends_on:
      ota_gh_postgres:
        condition: service_healthy
      ota_gh_mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import requests; requests.get('http://localhost:8080/health', timeout=5).raise_for_status()\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ota_gh_net
      - ota_vlm_net
    restart: unless-stopped

  ota_gh_dashboard:
    build:
      context: ./OTA_GH/dashboard
      dockerfile: Dockerfile
    ports:
      - "${OTA_GH_DASHBOARD_PORT:-3001}:80"
    depends_on:
      ota_gh_server:
        condition: service_healthy
    networks:
      - ota_gh_net
    restart: unless-stopped

  ota_vlm_mysql:
    image: mysql:8.0
    command: ["--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_ROOT_PASSWORD: ${OTA_VLM_DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${OTA_VLM_DB_NAME:-ota_dashboard}
      MYSQL_USER: ${OTA_VLM_DB_USER:-admin}
      MYSQL_PASSWORD: ${OTA_VLM_DB_PASSWORD:-admin}
    ports:
      - "${OTA_VLM_DB_PORT:-3307}:3306"
    volumes:
      - ota_vlm_mysql_data:/var/lib/mysql
      - ./OTA_VLM/ota-dashboard/backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ota_vlm_net
    restart: unless-stopped

  ota_vlm_backend:
    build:
      context: ./OTA_VLM/ota-dashboard/backend
      dockerfile: Dockerfile
    environment:
      PORT: 4000
      DB_HOST: ota_vlm_mysql
      DB_PORT: 3306
      DB_USER: ${OTA_VLM_DB_USER:-admin}
      DB_PASSWORD: ${OTA_VLM_DB_PASSWORD:-admin}
      DB_NAME: ${OTA_VLM_DB_NAME:-ota_dashboard}
      FAILED_CASE_BASE_DIR: /data/failed-case
    ports:
      - "${OTA_VLM_BACKEND_PORT:-4000}:4000"
    volumes:
      - "./OTA_VLM/failed case:/data/failed-case"
    depends_on:
      ota_vlm_mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ota_vlm_net
    restart: unless-stopped

  ota_vlm_frontend:
    build:
      context: ./OTA_VLM/ota-dashboard/frontend
      dockerfile: Dockerfile
    ports:
      - "${OTA_VLM_FRONTEND_PORT:-5173}:80"
    depends_on:
      ota_vlm_backend:
        condition: service_healthy
    networks:
      - ota_vlm_net
    restart: unless-stopped

volumes:
  ota_gh_postgres_data:
  ota_gh_mosquitto_data:
  ota_gh_mosquitto_log:
  ota_vlm_mysql_data:

networks:
  ota_gh_net:
    driver: bridge
  ota_vlm_net:
    driver: bridge
